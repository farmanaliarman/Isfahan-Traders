const num=(n,d=2)=>{const v=+(n||0);return v%1===0?String(v):v.toFixed(d)};
const daysAgo=s=>{const d=new Date(s+"T00:00:00"),n=new Date();n.setHours(0,0,0,0);return Math.round((n-d)/86400000)};
const inRange=(s,days)=>{const d=daysAgo(s);return d>=0&&d<=days};

const e=(tag,props,...kids)=>h(tag,props,...kids);

const Field=({label,children})=>e("div",null,e("label",{style:st.lbl},label),children);

const Card=({title,value,sub,green,red})=>e("div",{style:{...st.card,borderColor:green?"#A7F3D0":red?"#FECACA":C.border,background:green?"#F0FDF4":red?"#FFF5F5":C.card}},

const Tbl=({heads,rows,empty})=>e("div",{style:{overflowX:"auto",border:`1px solid ${C.border}`,borderRadius:12}},

const Toast=({msg,type})=>msg?e("div",{style:{position:"fixed",bottom:20,right:20,background:type==="error"?C.bad:C.good,color:"#fff",padding:"10px 18px",borderRadius:10,fontSize:13,fontWeight:600,zIndex:9999}},msg):null;

const TABS=["Dashboard","Raw Materials","Products","Labor","Material Issued","Production","Advances","Labor Ledger","Purchases","Suppliers","Customers","Sales","Payments","Supplier Payments","Expenses","Reports","Settings"];

function App(){
  const[tab,setTab]=useState("Dashboard");
  const[data,setData]=useState({});
  const[loading,setLoading]=useState(true);
  const[toast,setToast]=useState(null);
  const timer=useRef(null);

  const showToast=useCallback((msg,type="ok")=>{
    setToast({msg,type});clearTimeout(timer.current);
    timer.current=setTimeout(()=>setToast(null),2800);
  },[]);

  const load=useCallback(async()=>{
    try{
      const tables=["settings","colors","categories","raw_materials","suppliers","purchases","products","labor","material_issued","production","advances","customers","sales","payments","supplier_payments","expenses"];
      const res=await Promise.all(tables.map(t=>db.from(t).select("*").order("id",{ascending:true,nullsFirst:true})));
      const d={};tables.forEach((t,i)=>{d[t]=res[i].data||[]});
      d.settings=d.settings[0]||{business_name:"Isfahan Traders",cash_in_hand:0};
      setData(d);
    }catch(err){showToast("Load error: "+err.message,"error")}
    setLoading(false);
  },[showToast]);

  useEffect(()=>{load()},[load]);

  useEffect(()=>{
    const tables=["settings","categories","raw_materials","suppliers","purchases","products","labor","material_issued","production","advances","customers","sales","payments","supplier_payments","expenses"];
    const subs=tables.map(t=>db.channel("rt_"+t).on("postgres_changes",{event:"*",schema:"public",table:t},()=>load()).subscribe());
    return()=>subs.forEach(s=>db.removeChannel(s));
  },[load]);

  const refresh=useCallback(async fn=>{
    try{await fn();showToast("Saved ✓");await load()}
    catch(err){showToast(err.message,"error")}
  },[load,showToast]);

  const tp={data,db,refresh,showToast};

  return e("div",{style:{minHeight:"100vh",background:C.bg,fontFamily:"system-ui,sans-serif",color:C.ink}},
    // Header
    e("div",{style:{background:C.accentDark,color:"#fff",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,0.25)"}},
      e("div",{style:{width:36,height:36,borderRadius:"50%",background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:14}},"IT"),
      e("div",null,
        e("div",{style:{fontWeight:800,fontSize:16}},data.settings.business_name),
        e("div",{style:{fontSize:11,opacity:0.7}},"Shoe Upper Ledger · Live sync")
      )
    ),
    // Nav
    e("div",{style:{background:"#fff",borderBottom:`1px solid ${C.border}`,overflowX:"auto",position:"sticky",top:60,zIndex:99}},
      e("div",{style:{display:"flex",gap:2,padding:"8px 12px",minWidth:"max-content"}},
        ...TABS.map(t=>e("button",{key:t,onClick:()=>setTab(t),style:{padding:"6px 12px",borderRadius:20,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",background:tab===t?C.accent:"transparent",color:tab===t?"#fff":C.muted}},t))
      )
    ),
    // Content
    e("div",{style:{maxWidth:1100,margin:"0 auto",padding:"20px 16px"}},
      tab==="Dashboard"&&e(DashTab,tp),
      tab==="Raw Materials"&&e(RMTab,tp),
      tab==="Products"&&e(ProdTab,tp),
      tab==="Labor"&&e(LaborTab,tp),
      tab==="Material Issued"&&e(MatIssuedTab,tp),
      tab==="Production"&&e(ProductionTab,tp),
      tab==="Advances"&&e(AdvTab,tp),
      tab==="Labor Ledger"&&e(LedgerTab,tp),
      tab==="Purchases"&&e(PurchTab,tp),
      tab==="Suppliers"&&e(SuppTab,tp),
      tab==="Customers"&&e(CustTab,tp),
      tab==="Sales"&&e(SalesTab,tp),
      tab==="Payments"&&e(PayTab,tp),
      tab==="Supplier Payments"&&e(SPayTab,tp),
      tab==="Expenses"&&e(ExpTab,tp),
      tab==="Reports"&&e(RepTab,tp),
      tab==="Settings"&&e(SettTab,tp)
    ),
    e(Toast,toast||{msg:null})
  );
}

// ── DASHBOARD ──
function DashTab({data}){
  const{sales=[],production=[],purchases=[],raw_materials=[],products=[]}=data;
  const rev=sales.filter(r=>inRange(r.date,29)).reduce((s,r)=>s++(r.net_total||0),0);
  const rawVal=raw_materials.reduce((s,r)=>s++(r.opening_stock||0)*+(r.cost_per_unit||0),0);
  const custBal=(data.customers||[]).reduce((s,c)=>{
    const sold=sales.filter(r=>r.customer_id===c.id).reduce((a,r)=>a++(r.net_total||0),0);
    const paid=(data.payments||[]).filter(r=>r.customer_id===c.id).reduce((a,r)=>a++(r.amount||0),0);
    return s++(c.opening_balance||0)+sold-paid;
  },0);
  const suppBal=(data.suppliers||[]).reduce((s,sup)=>{
    const b=purchases.filter(r=>r.supplier_id===sup.id).reduce((a,r)=>a++(r.total_value||0),0);
    const p=(data.supplier_payments||[]).filter(r=>r.supplier_id===sup.id).reduce((a,r)=>a++(r.amount||0),0);
    return s++(sup.opening_balance||0)+b-p;
  },0);
  const nwc=rawVal+custBal-suppBal++(data.settings?.cash_in_hand||0);
  return e("div",{style:{display:"flex",flexDirection:"column",gap:20}},
    e("h2",{style:{fontSize:18,fontWeight:700,color:C.accentDark}},data.settings?.business_name+" — Overview"),
    e(Grid,{cols:2},
      e(Card,{title:"Revenue (30 days)",value:fmt(rev),sub:sales.filter(r=>inRange(r.date,29)).length+" sales"}),
      e(Card,{title:"Customer Receivable",value:fmt(custBal),green:custBal>0}),
      e(Card,{title:"Supplier Payable",value:fmt(suppBal),red:suppBal>0}),
      e(Card,{title:"Net Working Capital",value:fmt(nwc),green:nwc>0,sub:"Stock + Receivable − Payable + Cash"})
    ),
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}},
      e("div",{style:st.card},
        e("div",{style:{fontWeight:700,marginBottom:10}},"Raw Material Stock"),
        ...raw_materials.filter(r=>+(r.opening_stock||0)>0).slice(0,8).map(r=>
          e("div",{key:r.id,style:{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0",borderBottom:`1px solid ${C.border}`}},
            e("span",null,r.display_name),e("span",{style:{fontFamily:"monospace"}},r.opening_stock+" "+r.unit)
          )
        ),
        !raw_materials.filter(r=>+(r.opening_stock||0)>0).length&&e("div",{style:{color:C.muted,fontSize:13}},"No stock entered yet.")
      ),
      e("div",{style:st.card},
        e("div",{style:{fontWeight:700,marginBottom:10}},"Products in Stock"),
        ...products.map(p=>{
          const produced=(production||[]).filter(r=>r.product_id===p.id).reduce((s,r)=>s++(r.quantity||0),0);
          const sold=sales.filter(r=>r.product_id===p.id).reduce((s,r)=>s++(r.quantity||0),0);
          const stock=+(p.opening_stock||0)+produced-sold;
          return e("div",{key:p.id,style:{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0",borderBottom:`1px solid ${C.border}`}},
            e("span",null,p.name," ",e(Tag,null,p.color)),
            e("span",{style:{fontFamily:"monospace",color:stock<=0?C.bad:C.ink}},stock+" doz")
          );
        }),
        !products.length&&e("div",{style:{color:C.muted,fontSize:13}},"No products yet.")
      )
    )
  );
}

// ── RAW MATERIALS ──
function RMTab({data,db,refresh}){
  const[form,setForm]=useState({material_name:"Ragzine",color:"Black",unit:"meter",opening_stock:0,cost_per_unit:0,reorder_level:30});
  const rms=data.raw_materials||[];
  const save=()=>refresh(async()=>{const{error}=await db.from("raw_materials").insert([{...form,display_name:form.color==="No Color"?form.material_name:form.material_name+" - "+form.color}]);if(error)throw error});
  const del=id=>refresh(async()=>{const{error}=await db.from("raw_materials").delete().eq("id",id);if(error)throw error});
  const upd=(id,f,v)=>refresh(async()=>{const{error}=await db.from("raw_materials").update({[f]:v}).eq("id",id);if(error)throw error});
  const F=(label,field,type="text",opts)=>e(Field,{label},
    opts?e(Sel,{value:form[field],onChange:ev=>setForm({...form,[field]:ev.target.value})},
      ...opts.map(o=>e("option",{key:o},o))
    ):e(Inp,{type,value:form[field],onChange:ev=>setForm({...form,[field]:type==="number"?+ev.target.value:ev.target.value})})
  );
  return e("div",{style:{display:"flex",flexDirection:"column",gap:16}},
    e("h2",{style:{fontSize:18,fontWeight:700,color:C.accentDark}},"Raw Materials"),
    e("div",{style:{...st.card,display:"flex",flexDirection:"column",gap:10}},
      e("div",{style:{fontWeight:700,fontSize:14}},"Add Material"),
      e(Grid,{cols:3},
        F("Material Name","material_name"),
        F("Color","color","text",["Black","Green","Brown","Mustard","Cream","Maroon","Pink","Zink","Purple","Grey","No Color"]),
        F("Unit","unit"),
        F("Opening Stock","opening_stock","number"),
        F("Cost per Unit (₹)","cost_per_unit","number"),
        F("Reorder Level","reorder_level","number")
      ),
      e(Btn,{onClick:save},"+ Add Material")
    ),
    e(Tbl,{heads:["Name","Color","Unit","Opening Stock","Cost/Unit","Stock Value",""],
      rows:rms.map(r=>e("tr",{key:r.id},
        e("td",{style:st.td},r.material_name),
        e("td",{style:st.td},e(Tag,null,r.color)),
        e("td",{style:st.td},r.unit),
        e("td",{style:st.td},e(Inp,{type:"number",defaultValue:r.opening_stock,onBlur:ev=>upd(r.id,"opening_stock",+ev.target.value),style:{...st.inp,width:90}})),
        e("td",{style:st.td},e(Inp,{type:"number",defaultValue:r.cost_per_unit,onBlur:ev=>upd(r.id,"cost_per_unit",+ev.target.value),style:{...st.inp,width:90}})),
        e("td",{style:{...st.td,fontFamily:"monospace"}},fmt(+(r.opening_stock||0)*+(r.cost_per_unit||0))),
        e("td",{style:st.td},e(Del,{onClick:()=>del(r.id)},"✕"))
      )),
      empty:"No raw materials yet."
    })
  );
}

// ── PRODUCTS ──
function ProdTab({data,db,refresh}){
  const{products=[],categories=[],production=[],sales=[]}=data;
  const[form,setForm]=useState({name:"01",category:"Adult",color:"Black",selling_price:0,opening_stock:0});
  const save=()=>refresh(async()=>{const{error}=await db.from("products").insert([form]);if(error)throw error});
  const del=id=>refresh(async()=>{const{error}=await db.from("products").delete().eq("id",id);if(error)throw error});
  const upd=(id,f,v)=>refresh(async()=>{const{error}=await db.from("products").update({[f]:v}).eq("id",id);if(error)throw error});
  const stock=p=>+(p.opening_stock||0)+production.filter(r=>r.product_id===p.id).reduce((s,r)=>s++(r.quantity||0),0)-sales.filter(r=>r.product_id===p.id).reduce((s,r)=>s++(r.quantity||0),0);
  const COLORS=["Black","Green","Brown","Mustard","Cream","Maroon","Pink","Zink","Purple","Grey"];
  return e("div",{style:{display:"flex",flexDirection:"column",gap:16}},
    e("h2",{style:{fontSize:18,fontWeight:700,color:C.accentDark}},"Products"),
    e("div",{style:{...st.card,display:"flex",flexDirection:"column",gap:10}},
      e("div",{style:{fontWeight:700,fontSize:14}},"Add Product"),
      e(Grid,{cols:3},
        e(Field,{label:"Product Name"},e(Inp,{value:form.name,onChange:ev=>setForm({...form,name:ev.target.value})})),
        e(Field,{label:"Category"},e(Sel,{value:form.category,onChange:ev=>setForm({...form,category:ev.target.value})},
          ...categories.map(c=>e("option",{key:c.id},c.name)))),
        e(Field,{label:"Color"},e(Sel,{value:form.color,onChange:ev=>setForm({...form,color:ev.target.value})},
          ...COLORS.map(c=>e("option",{key:c},c)))),
        e(Field,{label:"Selling Price (₹)"},e(Inp,{type:"number",value:form.selling_price,onChange:ev=>setForm({...form,selling_price:+ev.target.value})})),
        e(Field,{label:"Opening Stock"},e(Inp,{type:"number",value:form.opening_stock,onChange:ev=>setForm({...form,opening_stock:+ev.target.value})}))
      ),
      e(Btn,{onClick:save},"+ Add Product")
    ),
    e(Tbl,{heads:["Name","Category","Color","Selling Price","Opening Stock","Current Stock",""],
      rows:products.map(p=>e("tr",{key:p.id},
        e("td",{style:st.td},p.name),
        e("td",{style:st.td},e(Tag,null,p.category)),
        e("td",{style:st.td},e(Tag,null,p.color)),
        e("td",{style:st.td},e(Inp,{type:"number",defaultValue:p.selling_price,onBlur:ev=>upd(p.id,"selling_price",+ev.target.value),style:{...st.inp,width:100}})),
        e("td",{style:st.td},e(Inp,{type:"number",defaultValue:p.opening_stock,onBlur:ev=>upd(p.id,"opening_stock",+ev.target.value),style:{...st.inp,width:80}})),
        e("td",{style:{...st.td,fontFamily:"monospace",fontWeight:700,color:stock(p)<=0?C.bad:C.ink}},stock(p)),
        e("td",{style:st.td},e(Del,{onClick:()=>del(p.id)},"✕"))
      )),
      empty:"No products yet."
    })
  );
}

// ── MATERIAL ISSUED ──
function MatIssuedTab({data,db,refresh}){
  const{labor=[],raw_materials=[],material_issued=[]}=data;
  const[form,setForm]=useState({date:today(),labor_id:"",material_id:"",quantity:0});
  const save=()=>refresh(async()=>{
    if(!form.labor_id||!form.material_id)throw new Error("Pick worker and material");
    const{error}=await db.from("material_issued").insert([{...form,labor_id:+form.labor_id,material_id:+form.material_id}]);
    if(error)throw error;

// ── LABOR LEDGER ──
function LedgerTab({data}){
  const{labor=[],production=[],advances=[],material_issued=[],raw_materials=[]}=data;
  const[sel,setSel]=useState(null);
  const worker=labor.find(l=>l.id===sel);
  const wProd=production.filter(r=>r.labor_id===sel);
  const wAdv=advances.filter(r=>r.labor_id===sel);
  const wIssued=material_issued.filter(r=>r.labor_id===sel);
  const totalWage=+(worker?.opening_balance_payable||0)+wProd.reduce((s,r)=>s++(r.wage_earned||0),0);
  const totalAdv=wAdv.reduce((s,r)=>s++(r.amount||0),0);
  const matBal=raw_materials.map(rm=>{
    const issued=wIssued.filter(r=>r.material_id===rm.id).reduce((s,r)=>s++(r.quantity||0),0);
    let consumed=0;
    wProd.forEach(pr=>{
      const pp=data.products?.find(p=>p.id===pr.product_id);
      if(rm.material_name==="Ragzine"&&pp?.color===rm.color)consumed+=+(pr.ragzine_used||0);
      if(rm.material_name==="Mash"&&pp?.color===rm.color)consumed+=+(pr.mash_used||0);
      if(rm.material_name==="Daimod")consumed+=+(pr.daimod_used||0);
      if(rm.material_name==="Naki Feeta")consumed+=+(pr.naki_feeta_used||0);
      if(rm.material_name==="Pipe")consumed+=+(pr.pipe_used||0);
    });
    return{...rm,issued,consumed,balance:issued-consumed};
  }).filter(r=>r.issued>0||r.balance!==0);
  const net=totalWage-totalAdv;
  return e("div",{style:{display:"flex",flexDirection:"column",gap:16}},
    e("h2",{style:{fontSize:18,fontWeight:700,color:C.accentDark}},"Labor Ledger"),
    e("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
      ...labor.map(l=>e("button",{key:l.id,onClick:()=>setSel(l.id===sel?null:l.id),
        style:{padding:"6px 14px",borderRadius:20,border:`1px solid ${C.border}`,background:sel===l.id?C.accent:C.card,color:sel===l.id?"#fff":C.ink,fontSize:13,fontWeight:600,cursor:"pointer"}},l.name))
    ),
    worker&&e("div",{style:{display:"flex",flexDirection:"column",gap:16}},
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}},
        e(Card,{title:"Wage Earned",value:fmt(totalWage),green:true}),
        e(Card,{title:"Advances Given",value:fmt(totalAdv),red:totalAdv>0}),
        e(Card,{title:"Net Payable",value:fmt(net),green:net>0,red:net<0})
      ),
      e("div",{style:st.card},
        e("div",{style:{fontWeight:700,marginBottom:10}},"Material Balance (in hand)"),
        matBal.length?e(Tbl,{heads:["Material","Color","Issued","Consumed","Balance"],
          rows:matBal.map(r=>e("tr",{key:r.id},
            e("td",{style:st.td},r.material_name),e("td",{style:st.td},e(Tag,null,r.color)),
            e("td",{style:{...st.td,fontFamily:"monospace"}},num(r.issued)),
            e("td",{style:{...st.td,fontFamily:"monospace"}},num(r.consumed)),
            e("td",{style:{...st.td,fontFamily:"monospace",color:r.balance<0?C.bad:C.good,fontWeight:700}},num(r.balance))
          ))
        }):e("div",{style:{color:C.muted,fontSize:13}},"No material issued to this worker yet.")
      ),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}},
        e("div",{style:st.card},
          e("div",{style:{fontWeight:700,marginBottom:8}},"Production History"),
          wProd.length?wProd.slice().reverse().map(r=>{
            const p=data.products?.find(x=>x.id===r.product_id);
            return e("div",{key:r.id,style:{display:"flex",justifyContent:"space-between",fontSize:13,padding:"3px 0",borderBottom:`1px solid ${C.border}`}},
              e("span",null,r.date+" · "+p?.name+" "+p?.color),
              e("span",{style:{fontFamily:"monospace"}},r.quantity+" doz · "+fmt(r.wage_earned))
            );
          }):e("div",{style:{color:C.muted,fontSize:13}},"No production yet.")
        ),
        e("div",{style:st.card},
          e("div",{style:{fontWeight:700,marginBottom:8}},"Advance History"),
          wAdv.length?wAdv.slice().reverse().map(r=>
            e("div",{key:r.id,style:{display:"flex",justifyContent:"space-between",fontSize:13,padding:"3px 0",borderBottom:`1px solid ${C.border}`}},
              e("span",null,r.date+(r.note?" · "+r.note:"")),
              e("span",{style:{fontFamily:"monospace",color:C.bad}},fmt(r.amount))
            )
          ):e("div",{style:{color:C.muted,fontSize:13}},"No advances yet.")
        )
      )
    ),
    !sel&&e("div",{style:{color:C.muted,textAlign:"center",padding:32,fontSize:13}},"Select a worker above to see their ledger.")
  );
}

// ── REPORTS ──
function RepTab({data}){
  const[period,setPeriod]=useState(29);
  const PERIODS=[{l:"Daily",d:0},{l:"Weekly (7d)",d:6},{l:"Fortnightly (15d)",d:14},{l:"Monthly (30d)",d:29},{l:"Annual (365d)",d:364}];
  const{sales=[],expenses=[],production=[],purchases=[],raw_materials=[],products=[],payments=[],supplier_payments=[],suppliers=[],customers=[]}=data;
  const pS=sales.filter(r=>inRange(r.date,period));
  const pE=expenses.filter(r=>inRange(r.date,period));
  const pP=production.filter(r=>inRange(r.date,period));
  const revenue=pS.reduce((s,r)=>s++(r.net_total||0),0);
  const discounts=pS.reduce((s,r)=>s++(r.discount||0),0);
  const overheads=pE.reduce((s,r)=>s++(r.amount||0),0)+discounts;
  const wages=pP.reduce((s,r)=>s++(r.wage_earned||0),0);
  const rawVal=raw_materials.reduce((s,r)=>s++(r.opening_stock||0)*+(r.cost_per_unit||0),0);
  const custBal=customers.reduce((s,c)=>{const sold=sales.filter(r=>r.customer_id===c.id).reduce((a,r)=>a++(r.net_total||0),0);const paid=payments.filter(r=>r.customer_id===c.id).reduce((a,r)=>a++(r.amount||0),0);return s++(c.opening_balance||0)+sold-paid},0);
  const suppBal=suppliers.reduce((s,sup)=>{const b=purchases.filter(r=>r.supplier_id===sup.id).reduce((a,r)=>a++(r.total_value||0),0);const p=supplier_payments.filter(r=>r.supplier_id===sup.id).reduce((a,r)=>a++(r.amount||0),0);return s++(sup.opening_balance||0)+b-p},0);
  const nwc=rawVal+custBal-suppBal++(data.settings?.cash_in_hand||0);
  const gross=revenue-wages;
  const net=gross-overheads;
  const margin=revenue?(net/revenue*100).toFixed(1):"—";
  const roi=nwc?(net/nwc*100).toFixed(2):"—";
  const units=pP.reduce((s,r)=>s++(r.quantity||0),0);
  const unitsSold=pS.reduce((s,r)=>s++(r.quantity||0),0);
  const R=(label,val,bold,green,red)=>e("tr",null,
    e("td",{style:st.td},label),
    e("td",{style:{...st.td,textAlign:"right",fontFamily:"monospace",fontWeight:bold?700:400,color:green?C.good:red?C.bad:C.ink}},val)
  );
  return e("div",{style:{display:"flex",flexDirection:"column",gap:20}},
    e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}},
      e("h2",{style:{fontSize:18,fontWeight:700,color:C.accentDark}},"Reports"),
      e("div",{style:{display:"flex",gap:4,flexWrap:"wrap"}},
        ...PERIODS.map(p=>e("button",{key:p.d,onClick:()=>setPeriod(p.d),
          style:{padding:"5px 10px",borderRadius:20,border:`1px solid ${C.border}`,background:period===p.d?C.accent:C.card,color:period===p.d?"#fff":C.muted,fontSize:11,fontWeight:600,cursor:"pointer"}},p.l))
      )
    ),
    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}},
      e(Card,{title:"Net Profit",value:fmt(net),green:net>0,red:net<0,sub:`Margin ${margin}%`}),
      e(Card,{title:"Revenue",value:fmt(revenue),sub:`${pS.length} sales · ${unitsSold} doz`}),
      e(Card,{title:"Wages",value:fmt(wages),sub:`${units} doz produced`}),
      e(Card,{title:"Overheads + Discounts",value:fmt(overheads),sub:`Discounts: ${fmt(discounts)}`}),
      e(Card,{title:"Net Working Capital",value:fmt(nwc),green:nwc>0,sub:"Stock + Recv − Pay + Cash"}),
      e(Card,{title:"ROI",value:roi==="—"?"—":roi+"%",green:+roi>0,sub:"Net Profit ÷ NWC"})
    ),
    e("div",{style:st.card},
      e("div",{style:{fontWeight:700,fontSize:14,marginBottom:12}},"Profit & Loss"),
      e("table",{style:{width:"100%",borderCollapse:"collapse"}},
        e("tbody",null,
          R("Sales Revenue (net of discounts)",fmt(revenue)),
          R("− Wage Cost",`− ${fmt(wages)}`),
          R("Gross Profit",fmt(gross),true,gross>0,gross<0),
          R("− Other Overheads & Discounts",`− ${fmt(overheads)}`),
          R("Net Profit",fmt(net),true,net>0,net<0),
          R("Profit Margin %",margin==="—"?"—":margin+"%",false,false,false)
        )
      )
    ),
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}},
      e("div",{style:st.card},
        e("div",{style:{fontWeight:700,marginBottom:10}},"Customer Balances"),
        ...customers.map(c=>{
          const sold=sales.filter(r=>r.customer_id===c.id).reduce((a,r)=>a++(r.net_total||0),0);
          const paid=payments.filter(r=>r.customer_id===c.id).reduce((a,r)=>a++(r.amount||0),0);
          const bal=+(c.opening_balance||0)+sold-paid;
          return e("div",{key:c.id,style:{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0",borderBottom:`1px solid ${C.border}`}},
            e("span",null,c.name),e("span",{style:{fontFamily:"monospace",color:bal>0?C.bad:C.good,fontWeight:600}},fmt(bal))
          );
        }),
        !customers.length&&e("div",{style:{color:C.muted,fontSize:13}},"No customers.")
      ),
      e("div",{style:st.card},
        e("div",{style:{fontWeight:700,marginBottom:10}},"Supplier Balances"),
        ...suppliers.map(s=>{
          const b=purchases.filter(r=>r.supplier_id===s.id).reduce((a,r)=>a++(r.total_value||0),0);
          const p=supplier_payments.filter(r=>r.supplier_id===s.id).reduce((a,r)=>a++(r.amount||0),0);
          const bal=+(s.opening_balance||0)+b-p;
          return e("div",{key:s.id,style:{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0",borderBottom:`1px solid ${C.border}`}},
            e("span",null,s.name),e("span",{style:{fontFamily:"monospace",color:bal>0?C.bad:C.good,fontWeight:600}},fmt(bal))
          );
        }),
        !suppliers.length&&e("div",{style:{color:C.muted,fontSize:13}},"No suppliers.")
      )
    )
  );
}

      e(Tbl,{heads:["Category","Ragzine/pc","Mash/pc","Daimod/pc","Naki Feeta/pc","Pipe/pc","Wage Rate/pc"],

  );
}
